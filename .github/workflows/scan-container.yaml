name: CAP Operator Container Vuln Scans
on:

  schedule:
    - cron:  '30 9 * * *'

  workflow_dispatch:
    inputs:
      version:
        description: 'Image tag to scan'
        required: false
        default: 'latest'
        type: string

permissions:
  packages: read
  security-events: write
  
jobs:  
  scan:
    name: Scan Image
    strategy:
      matrix:
        workload: ["controller", "server", "web-hooks"]
    runs-on: ubuntu-24.04
    steps:
      - name: Run vulnerability scanner
        uses: aquasecurity/trivy-action@0.32.0
        with:
          image-ref: 'ghcr.io/sap/cap-operator/${{ matrix.workload }}:${{ github.event.inputs.version }}'
          scanners: 'vuln'
          version: 'v0.65.0'
          format: 'sarif'
          output: 'vuln-${{ matrix.workload }}.sarif'

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'vuln-${{ matrix.workload }}.sarif'

