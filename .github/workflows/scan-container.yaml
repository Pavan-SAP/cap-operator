name: Container Vuln Scans
on:

  schedule:
    - cron:  '30 21 * * *'

  workflow_dispatch:

permissions:
  packages: read
  pull-requests: read
  
jobs:
  setup:
    name: Setup trivy
    runs-on: ubuntu-24.04
    steps:
      - name: Setup trivy
        uses: aquasecurity/setup-trivy@v0.2.3
        with:
          version: v0.65.0
          cache: true
  
  scan:
    name: Scan Image
    needs: setup
    strategy:
      matrix:
        workload: ["controller", "server", "web-hooks"]
    runs-on: ubuntu-24.04
    steps:
      - name: Run vulnerability scanner
        uses: aquasecurity/trivy-action@0.32.0
        with:
          image-ref: 'ghcr.io/sap/cap-operator/${{ matrix.workload }}'
          exit-code: '1'
